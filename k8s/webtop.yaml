# VDI proof-of-concept: a browser-accessible Linux desktop with persistent storage.
# - PVC (local-path, k3s's built-in storage) holds the user's home/config.
# - Deployment runs the webtop desktop container.
# - NodePort exposes it at http://<any-node-ip>:30000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: webtop-config
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webtop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webtop
  template:
    metadata:
      labels:
        app: webtop
    spec:
      containers:
        - name: webtop
          image: lscr.io/linuxserver/webtop:latest
          ports:
            - containerPort: 3000
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/New_York"
          volumeMounts:
            - name: config
              mountPath: /config          # webtop persists the desktop/home here
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: webtop-config
---
apiVersion: v1
kind: Service
metadata:
  name: webtop
spec:
  type: NodePort
  selector:
    app: webtop
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30000
